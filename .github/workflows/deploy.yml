name: Deploy Stampport

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/stampport_deploy_key
          chmod 600 ~/.ssh/stampport_deploy_key
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/stampport_deploy_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" <<'EOF'
          set -euo pipefail

          cd /home/admin/stampport
          git pull origin main

          echo "▶ Build Stampport app web"
          cd /home/admin/stampport/app/web
          npm install
          npm run build

          sudo mkdir -p /var/www/stampport
          sudo rm -rf /var/www/stampport/*
          sudo cp -r dist/* /var/www/stampport/

          echo "▶ Build Stampport control tower web"
          cd /home/admin/stampport/control_tower/web
          npm install
          npm run build

          sudo mkdir -p /var/www/stampport-control
          sudo rm -rf /var/www/stampport-control/*
          sudo cp -r dist/* /var/www/stampport-control/

          echo "▶ Restart API services"
          # Pick up Python source changes (schemas.py, routers/*.py, etc.)
          # — frontend dist refresh alone leaves uvicorn running the old
          # ALLOWED_COMMANDS allowlist, which silently rejects new commands
          # like start_autopilot until the service is bounced. We don't
          # fail the deploy when a unit isn't registered yet: stampport-api
          # is optional on hosts that only run the control surface.
          for svc in stampport-api stampport-control-api; do
            if systemctl list-unit-files --no-legend "$svc.service" \
                | grep -q "$svc.service"; then
              echo "  · sudo systemctl restart $svc"
              sudo systemctl restart "$svc"
            else
              echo "  · skipping $svc — not installed"
            fi
          done

          echo "▶ Health checks"
          # Wait for uvicorn to come back up before failing the workflow.
          for i in 1 2 3 4 5 6; do
            if curl -fsS --max-time 5 https://reviewdr.kr/stampport-control-api/health >/dev/null; then
              break
            fi
            sleep 2
          done
          curl -f https://reviewdr.kr/stampport-control-api/health
          curl -I https://reviewdr.kr/stampport/
          curl -I https://reviewdr.kr/stampport-control/

          echo "✅ Stampport deploy completed"
          EOF
